<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card de Habilidades</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="skill-card">
        <div class="skill-item">
            <span class="skill-name">HTML</span>
            <div class="progress-bar-container">
                <div class="progress-bar-background"></div>
                <div class="progress-bar-fill" style="width: 90%;"></div>
                <div class="tooltip" style="left: calc(90% - 13px);">90%</div>
            </div>
        </div>
        <div class="skill-item">
            <span class="skill-name">CSS</span>
            <div class="progress-bar-container">
                <div class="progress-bar-background"></div>
                <div class="progress-bar-fill" style="width: 70%;"></div>
                <div class="tooltip" style="left: calc(70% - 13px);">70%</div>
            </div>
        </div>
        <div class="skill-item">
            <span class="skill-name">JavaScript</span>
            <div class="progress-bar-container">
                <div class="progress-bar-background"></div>
                <div class="progress-bar-fill" style="width: 50%;"></div>
                <div class="tooltip" style="left: calc(50% - 13px);">50%</div>
            </div>
        </div>
        <div class="skill-item">
            <span class="skill-name">NodeJS</span>
            <div class="progress-bar-container">
                <div class="progress-bar-background"></div>
                <div class="progress-bar-fill" style="width: 30%;"></div>
                <div class="tooltip" style="left: calc(30% - 13px);">30%</div>
            </div>
        </div>
    </div>
<script src="script.js"></script>
</body>
</html>
